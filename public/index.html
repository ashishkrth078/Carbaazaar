<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbaazaar - Vehicle Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .vehicle-card { cursor: pointer; }
        .vehicle-card.selected { border-color: #007bff; background-color: #f8f9ff; }
        .result { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Carbaazaar - Vehicle Management System</h1>

        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>Vehicles</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-primary mb-3" onclick="loadVehicles()">Refresh List</button>
                        <div id="vehicleList"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card mb-3">
                    <div class="card-header">
                        <h5>Create New Vehicle</h5>
                    </div>
                    <div class="card-body">
                        <form id="createVehicleForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <label class="form-label">VIN</label>
                                    <input type="text" class="form-control" id="vin" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Registration Number</label>
                                    <input type="text" class="form-control" id="registrationNumber" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-4">
                                    <label class="form-label">Make</label>
                                    <input type="text" class="form-control" id="make" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Model</label>
                                    <input type="text" class="form-control" id="model" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Year</label>
                                    <input type="number" class="form-control" id="year" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success mt-3">Create Vehicle</button>
                        </form>
                    </div>
                </div>

                <div class="card mb-3" id="serviceCard" style="display: none;">
                    <div class="card-header">
                        <h5>Add Service Record for <span id="selectedVin"></span></h5>
                    </div>
                    <div class="card-body">
                        <form id="addServiceForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <label class="form-label">Service Center ID</label>
                                    <input type="text" class="form-control" id="serviceCenterId" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Mileage</label>
                                    <input type="number" class="form-control" id="mileage" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <label class="form-label">Service Type</label>
                                    <input type="text" class="form-control" id="serviceType" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Total Cost</label>
                                    <input type="number" class="form-control" id="totalCost" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-warning mt-3">Add Service</button>
                            <button type="button" class="btn btn-info mt-3 ms-2" onclick="viewHistory()">View History</button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5>Results</h5>
                    </div>
                    <div class="card-body">
                        <div id="results" class="result border p-3 bg-white"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedVin = null;

        function showResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<div class="alert alert-${type}" role="alert">${message}</div>`;
        }

        async function loadVehicles() {
            try {
                const response = await fetch('/vehicles');
                const vehicles = await response.json();
                const list = document.getElementById('vehicleList');
                list.innerHTML = vehicles.map(vehicle => 
                    `<div class="card vehicle-card mb-2 p-2" onclick="selectVehicle('${vehicle.vin}')">
                        <strong>${vehicle.vin}</strong><br>
                        ${vehicle.make} ${vehicle.model} (${vehicle.year})<br>
                        Reg: ${vehicle.registrationNumber}
                    </div>`
                ).join('');
                showResult(`${vehicles.length} vehicles loaded.`, 'success');
            } catch (error) {
                showResult(`Error loading vehicles: ${error.message}`, 'danger');
            }
        }

        function selectVehicle(vin) {
            selectedVin = vin;
            document.getElementById('selectedVin').textContent = vin;
            document.getElementById('serviceCard').style.display = 'block';
            document.querySelectorAll('.vehicle-card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            showResult(`Selected vehicle: ${vin}`, 'info');
        }

        document.getElementById('createVehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                vin: document.getElementById('vin').value,
                registrationNumber: document.getElementById('registrationNumber').value,
                make: document.getElementById('make').value,
                model: document.getElementById('model').value,
                year: parseInt(document.getElementById('year').value)
            };
            try {
                const response = await fetch('/vehicles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    showResult(`Vehicle created successfully!`, 'success');
                    loadVehicles();
                    e.target.reset();
                } else {
                    showResult(`Error: ${result.error}`, 'danger');
                }
            } catch (error) {
                showResult(`Error: ${error.message}`, 'danger');
            }
        });

        document.getElementById('addServiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!selectedVin) {
                showResult('Please select a vehicle first.', 'warning');
                return;
            }
            const data = {
                serviceCenterId: document.getElementById('serviceCenterId').value,
                mileage: parseInt(document.getElementById('mileage').value),
                serviceType: document.getElementById('serviceType').value,
                totalCost: parseInt(document.getElementById('totalCost').value)
            };
            try {
                const response = await fetch(`/vehicles/${selectedVin}/services`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    showResult(`Service added successfully!`, 'success');
                    e.target.reset();
                } else {
                    showResult(`Error: ${result.error}`, 'danger');
                }
            } catch (error) {
                showResult(`Error: ${error.message}`, 'danger');
            }
        });

        async function viewHistory() {
            if (!selectedVin) {
                showResult('Please select a vehicle first.', 'warning');
                return;
            }
            try {
                const response = await fetch(`/vehicles/${selectedVin}/history`);
                const result = await response.json();
                if (response.ok) {
                    showResult(`<h6>Owner History:</h6><pre>${JSON.stringify(result.ownerHistory, null, 2)}</pre>
                        <h6>Service Records:</h6><pre>${JSON.stringify(result.serviceRecords, null, 2)}</pre>
                        <h6>Insurance:</h6><pre>${JSON.stringify(result.insurance, null, 2)}</pre>
                        <h6>Accidents:</h6><pre>${JSON.stringify(result.accidents, null, 2)}</pre>`, 'info');
                } else {
                    showResult(`Error: ${result.error}`, 'danger');
                }
            } catch (error) {
                showResult(`Error: ${error.message}`, 'danger');
            }
        }

        // Load vehicles on page load
        loadVehicles();
    </script>
</body>
</html>
