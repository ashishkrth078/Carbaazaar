version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: carbaazaar-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: carbaazaar

  app:
    build: .
    container_name: carbaazaar-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/carbaazaar
      PORT: 3000

volumes:
  mongo_data: